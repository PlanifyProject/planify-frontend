<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planify — Inicia sesión</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="logo">
      <h1>💰 Planify</h1>
      <p>Tu gestor de finanzas personales</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="active" id="tabLoginBtn"   onclick="showTab('login')">Iniciar sesión</button>
      <button id="tabRegisterBtn" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- Alerta global -->
    <div class="alert" id="authAlert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Ingresar</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none;">
      <div class="form-group">
        <label for="regUsername">Nombre de usuario</label>
        <input type="text" id="regUsername" placeholder="Tu nombre" required />
      </div>
      <div class="form-group">
        <label for="regEmail">Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="form-group">
        <label for="regPassword">Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Crear cuenta</button>
    </form>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
