<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transacciones — Planify</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <span class="nav-brand">💰 <span>Planify</span></span>
  <div class="nav-links">
    <a href="dashboard.html">Home</a>
    <a href="transactions.html">Transacciones</a>
    <a href="categories.html">Categorías</a>
    <a href="reports.html">Reportes</a>
    <a href="profile.html">Perfil</a>
  </div>
  <div class="nav-actions">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h2>Transacciones</h2>
      <p>Registra y gestiona tus ingresos y gastos</p>
    </div>
    <button class="btn btn-primary" id="newTxBtn">+ Nueva transacción</button>
  </div>

  <div class="alert" id="txAlert"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" id="filterStart" />
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" id="filterEnd" />
    </div>
    <div class="filter-group">
      <label>Tipo</label>
      <select id="filterType">
        <option value="">Todos</option>
        <option value="income">Ingresos</option>
        <option value="expense">Gastos</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Categoría</label>
      <select id="filterCategory">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group" style="justify-content:flex-end;">
      <label>&nbsp;</label>
      <button class="btn btn-primary btn-sm" onclick="loadTransactions()">Filtrar</button>
    </div>
  </div>

  <!-- Summary mini-bar -->
  <div class="stats-grid" id="txStats" style="margin-bottom:1.25rem;"></div>

  <!-- Table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Tipo</th>
          <th>Monto</th>
          <th style="text-align:center;">Acciones</th>
        </tr>
      </thead>
      <tbody id="txTable">
        <tr><td colspan="6"><div class="spinner-wrap"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Create / Edit -->
<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="txModalTitle">Nueva transacción</h3>
      <button class="modal-close" onclick="closeModal('txModal')">&times;</button>
    </div>
    <div class="alert" id="txModalAlert"></div>
    <form id="txForm">
      <input type="hidden" id="txId" />
      <div class="form-group">
        <label for="txType">Tipo *</label>
        <select id="txType" required onchange="filterCategorySelect()">
          <option value="income">Ingreso</option>
          <option value="expense">Gasto</option>
        </select>
      </div>
      <div class="form-group">
        <label for="txCategory">Categoría *</label>
        <select id="txCategory" required></select>
      </div>
      <div class="form-group">
        <label for="txAmount">Monto *</label>
        <input type="number" id="txAmount" min="1" step="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label for="txDate">Fecha *</label>
        <input type="date" id="txDate" required />
      </div>
      <div class="form-group">
        <label for="txDescription">Descripción</label>
        <input type="text" id="txDescription" placeholder="Descripción opcional" />
      </div>
      <div style="display:flex; gap:.75rem; justify-content:flex-end; margin-top:1.25rem;">
        <button type="button" class="btn btn-outline" onclick="closeModal('txModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="txSubmitBtn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Delete Confirm -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:360px; text-align:center;">
    <div class="modal-header">
      <h3>¿Eliminar transacción?</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')">&times;</button>
    </div>
    <p style="color:var(--muted); margin-bottom:1.5rem;">Esta acción no se puede deshacer.</p>
    <div style="display:flex; gap:.75rem; justify-content:center;">
      <button class="btn btn-outline" onclick="closeModal('deleteModal')">Cancelar</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/transactions.js"></script>
</body>
</html>
