<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Planify</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <span class="nav-brand">💰 <span>Planify</span></span>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="transactions.html">Transacciones</a>
    <a href="categories.html">Categorías</a>
    <a href="reports.html">Reportes</a>
    <a href="profile.html">Perfil</a>
  </div>
  <div class="nav-actions">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h2 id="welcomeMsg">Bienvenido 👋</h2>
      <p>Resumen de tus finanzas este mes</p>
    </div>
    <a href="transactions.html" class="btn btn-primary">+ Nueva transacción</a>
  </div>

  <!-- Stat cards -->
  <div class="stats-grid" id="statsGrid">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>

  <!-- Recent transactions -->
  <div class="page-header" style="margin-top:2rem;">
    <h2 style="font-size:1.1rem;">Transacciones recientes</h2>
    <a href="transactions.html" class="btn btn-outline btn-sm">Ver todas</a>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Tipo</th>
          <th>Monto</th>
        </tr>
      </thead>
      <tbody id="recentTable">
        <tr><td colspan="5"><div class="spinner-wrap"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
